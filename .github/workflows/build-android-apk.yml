# ---------------------------------------------------------------------------
# Builds the SuperCalculator Android APK (aarch64).
# Uses the pre-installed Android SDK on the GitHub runner; only installs
# the NDK version required by the project.
#
# WARNING: Each run consumes ~6-8 GitHub Actions minutes on free tier.
# Run sparingly. Artifacts expire after 7 days.
# ---------------------------------------------------------------------------
name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/27.0.12077973

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install NDK 27
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            --sdk_root=$ANDROID_SDK_ROOT \
            --install "ndk;27.0.12077973" > /dev/null 2>&1
          echo "NDK installed at $ANDROID_NDK_HOME"
          ls "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/" | head -3

      - name: Copy C source into Android project
        run: cp calc_core.c android/app/src/main/cpp/calc_core.c

      - name: Install Gradle and build APK
        working-directory: android
        run: |
          sudo apt-get install -y -qq gradle > /dev/null 2>&1
          gradle wrapper --gradle-version 8.4
          ./gradlew assembleRelease --no-daemon

      - name: Sign APK with debug key
        run: |
          APK_UNSIGNED="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          APK_SIGNED="SuperCalculator-android-aarch64.apk"
          keytool -genkey -v -keystore debug.keystore -storepass android \
            -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Debug,O=SuperCalc,C=US" > /dev/null 2>&1
          $ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner sign \
            --ks debug.keystore --ks-pass pass:android \
            --out $APK_SIGNED $APK_UNSIGNED
          ls -lh $APK_SIGNED
          file $APK_SIGNED

      - uses: actions/upload-artifact@v4
        with:
          name: SuperCalculator-android-aarch64
          path: SuperCalculator-android-aarch64.apk
          retention-days: 7
