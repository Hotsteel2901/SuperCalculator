name: Build Windows EXE

on:
  workflow_dispatch:
    inputs:
      push_release:
        description: 'Upload to GitHub Release'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write

jobs:
  build-exe:
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller numpy matplotlib

      - name: Build calc_core.dll
        run: |
          gcc -shared -O2 -o calc_core.dll calc_core.c -lm
        shell: bash

      - name: Create PyInstaller spec file
        run: |
          pyi-makespec --onefile --windowed --name SuperCalculator super_calc_bridged.py
        shell: bash

      - name: Modify spec file for data files
        run: |
          $spec = Get-Content "SuperCalculator.spec" -Raw
          $spec = $spec -replace 'a = Analysis\(', 'a = Analysis(`calc_core.dll`,`'
          $spec = $spec -replace "datas=\[\],", "datas=[('calc_core.dll', '.')],"
          Set-Content "SuperCalculator.spec" -Value $spec
        shell: pwsh

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller SuperCalculator.spec
        shell: bash

      - name: Verify EXE
        run: |
          ls dist/
          Write-Host "EXE size: $((Get-Item dist/SuperCalculator.exe).Length) bytes"

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: SuperCalculator-Windows-EXE
          path: dist/SuperCalculator.exe
          retention-days: 30

      - name: Create Release and Upload (if enabled)
        if: inputs.push_release == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: exe-${{ github.run_number }}
          name: Windows EXE Build #${{ github.run_number }}
          files: dist/SuperCalculator.exe
          generate_release_notes: true
          make_latest: true
