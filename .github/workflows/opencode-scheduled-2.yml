name: Scheduled OpenCode Fix Bugs

on:
  schedule:
    - cron: "0 12 * * *"

jobs:
  opencode:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        with:
          model: opencode-go/qwen3.5-plus
          prompt: |
            全面检查仓库，并修复潜在的bug，修好后处理依赖和兼容性，再次检查有无新增或没修好的bug，再修复后提交（记得为安卓版同步）
